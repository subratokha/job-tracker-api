spring.application.name=application-service
server.port=8082
spring.datasource.url=${APPLICATION_SERVICE_DB_URL}
spring.datasource.username=${APPLICATION_SERVICE_DB_USERNAME}
spring.datasource.password=${APPLICATION_SERVICE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect