services:
  postgres-user-service:
    image: postgres:16
    container_name: postgres-user-service
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: ${USER_SERVICE_DB_USERNAME}
      POSTGRES_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  user-service-app:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service-app
    ports:
      - "8081:8081"
    environment:
      USER_SERVICE_DB_URL: jdbc:postgresql://postgres-user-service:5432/user_service
      USER_SERVICE_DB_USERNAME: ${USER_SERVICE_DB_USERNAME}
      USER_SERVICE_DB_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      USER_SERVICE_JWT_SECRET: ${USER_SERVICE_JWT_SECRET}
    depends_on:
      - postgres-user-service

volumes:
  postgres-data: