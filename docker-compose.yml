services:
  postgres-user-service:
    image: postgres:16
    container_name: postgres-user-service
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: ${USER_SERVICE_DB_USERNAME}
      POSTGRES_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
    volumes:
      - postgres-user-data:/var/lib/postgresql/data

  user-service-app:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service-app
    ports:
      - "8081:8081"
    environment:
      USER_SERVICE_DB_URL: jdbc:postgresql://postgres-user-service:5432/user_service
      USER_SERVICE_DB_USERNAME: ${USER_SERVICE_DB_USERNAME}
      USER_SERVICE_DB_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      USER_SERVICE_JWT_SECRET: ${USER_SERVICE_JWT_SECRET}
    depends_on:
      - postgres-user-service

  postgres-application-service:
    image: postgres:16
    container_name: postgres-application-service
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: application_service
      POSTGRES_USER: ${APPLICATION_SERVICE_DB_USERNAME}
      POSTGRES_PASSWORD: ${APPLICATION_SERVICE_DB_PASSWORD}
    volumes:
      - postgres-application-data:/var/lib/postgresql/data

  application-service-app:
    build:
      context: .
      dockerfile: application-service/Dockerfile
    container_name: application-service-app
    ports:
      - "8082:8082"
    environment:
      APPLICATION_SERVICE_DB_URL: jdbc:postgresql://postgres-application-service:5432/application_service
      APPLICATION_SERVICE_DB_USERNAME: ${APPLICATION_SERVICE_DB_USERNAME}
      APPLICATION_SERVICE_DB_PASSWORD: ${APPLICATION_SERVICE_DB_PASSWORD}
    depends_on:
      - postgres-application-service
volumes:
  postgres-user-data:
  postgres-application-data: